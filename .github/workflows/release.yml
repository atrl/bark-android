name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build signed release APK and AAB
    runs-on: ubuntu-latest
    env:
      BARK_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.BARK_ANDROID_KEYSTORE_PASSWORD }}
      BARK_ANDROID_KEY_ALIAS: ${{ secrets.BARK_ANDROID_KEY_ALIAS }}
      BARK_ANDROID_KEY_PASSWORD: ${{ secrets.BARK_ANDROID_KEY_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        env:
          BARK_ANDROID_KEYSTORE_BASE64: ${{ secrets.BARK_ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$BARK_ANDROID_KEYSTORE_BASE64"
          test -n "$BARK_ANDROID_KEYSTORE_PASSWORD"
          test -n "$BARK_ANDROID_KEY_ALIAS"
          test -n "$BARK_ANDROID_KEY_PASSWORD"
          mkdir -p "$RUNNER_TEMP/signing"
          printf '%s' "$BARK_ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/signing/release.keystore"
          echo "BARK_ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/signing/release.keystore" >> "$GITHUB_ENV"

      - name: Run tests
        run: ./gradlew --console=plain :core:test :app:testDebugUnitTest

      - name: Build signed release APK and AAB
        run: ./gradlew --console=plain :app:assembleRelease :app:bundleRelease -x lintVitalAnalyzeRelease

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: bark-android-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v4
        with:
          name: bark-android-release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 30

      - name: Upload signed artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          fail_on_unmatched_files: true
